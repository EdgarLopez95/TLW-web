name: Deploy TLW Website to Crazy Domains FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload website by FTP
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Deploy to Crazy Domains hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            .cursor/**
            .claude/**
            .vscode/**
            README.md
            AGENTS.md
            CLAUDE.md
            DESIGN_SYSTEM.md