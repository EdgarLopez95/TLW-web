<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Learning Warehouse — Coming Soon</title>
  <meta name="description" content="The Learning Warehouse is getting a refresh. We'll be back soon with something worth the wait.">
  <link rel="icon" href="assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-emerald:  #096C29;
      --color-navy:     #171739;
      --color-offwhite: #F7F4EE;
      --color-lime:     #C7F136;
      --color-purple:   #B49AFD;
      --font:           'Montserrat', 'Helvetica Neue', Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font);
      background: var(--color-offwhite);
      color: var(--color-navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Dot-grid texture ── */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(23,23,57,.09) 1.4px, transparent 1.4px),
        radial-gradient(circle, rgba(23,23,57,.04) .8px,  transparent .8px);
      background-size: 28px 28px, 28px 28px;
      background-position: 0 0, 14px 14px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Decorative circles ── */
    .deco {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform;
    }

    .deco--lime {
      --s: clamp(260px, 34vw, 520px);
      width: var(--s); height: var(--s);
      background: var(--color-lime);
      top:  calc(var(--s) * -.42);
      left: calc(var(--s) * -.42);
    }

    .deco--purple {
      --s: clamp(220px, 28vw, 440px);
      width: var(--s); height: var(--s);
      background: var(--color-purple);
      bottom: calc(var(--s) * -.4);
      right:  calc(var(--s) * -.4);
      opacity: .88;
    }

    .deco--emerald {
      --s: clamp(64px, 8vw, 120px);
      width: var(--s); height: var(--s);
      background: var(--color-emerald);
      top:   14%;
      right: 9%;
    }

    .deco--navy {
      --s: clamp(44px, 5.5vw, 88px);
      width: var(--s); height: var(--s);
      background: var(--color-navy);
      bottom: 16%;
      left:   11%;
      opacity: .12;
    }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: clamp(40px, 8vw, 80px) clamp(24px, 6vw, 48px);
      max-width: 680px;
      width: 100%;
    }

    .logo {
      width: min(220px, 64vw);
      height: auto;
      margin: 0 auto clamp(36px, 5vw, 56px);
      display: block;
    }

    .overline {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--color-emerald);
      margin-bottom: 18px;
    }

    .headline {
      font-size: clamp(38px, 6.5vw, 76px);
      font-weight: 800;
      line-height: 1.04;
      letter-spacing: -.028em;
      color: var(--color-navy);
      margin-bottom: clamp(20px, 3vw, 32px);
    }

    .headline em {
      font-style: italic;
      font-weight: 500;
      color: var(--color-emerald);
    }

    .lead {
      font-size: clamp(15px, 1.6vw, 18px);
      font-weight: 500;
      line-height: 1.65;
      color: rgba(23,23,57,.62);
      max-width: 440px;
      margin: 0 auto clamp(32px, 4vw, 48px);
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: min(300px, 78vw);
      margin: 0 auto clamp(32px, 4vw, 44px);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(23,23,57,.38);
      margin-bottom: 10px;
    }

    .progress-pct {
      color: var(--color-emerald);
      font-weight: 700;
    }

    .progress-track {
      height: 4px;
      background: rgba(23,23,57,.1);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--color-emerald), var(--color-lime));
      transform-origin: left center;
    }

    /* ── CTA ── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--color-emerald);
      color: var(--color-offwhite);
      border-radius: 12px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .02em;
      text-decoration: none;
      transition: background 150ms ease-out, transform 150ms ease-out, box-shadow 150ms ease-out;
      box-shadow: 0 8px 24px rgba(9,108,41,.22);
    }

    .cta:hover {
      background: #0A7D2F;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(9,108,41,.28);
    }

    .cta:active { transform: scale(.98); }

    .cta svg {
      width: 16px; height: 16px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="deco deco--lime"    aria-hidden="true"></div>
  <div class="deco deco--purple"  aria-hidden="true"></div>
  <div class="deco deco--emerald" aria-hidden="true"></div>
  <div class="deco deco--navy"    aria-hidden="true"></div>

  <div class="content">

    <img class="logo"
         src="assets/images/logos/twh-logo-primary.svg"
         alt="The Learning Warehouse">

    <span class="overline">Website update</span>

    <h1 class="headline">
      Good learning<br>is <em>on its way.</em>
    </h1>

    <p class="lead">
      This website is currently under development.<br>
      We&rsquo;ll be back soon.
    </p>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>In progress</span>
        <span class="progress-pct" id="pct-label">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <a href="mailto:admin@thelearningwarehouse.com" class="cta">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <rect width="20" height="16" x="2" y="4" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      Get in touch in the meantime
    </a>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

    const TARGET_PCT = 45

    if (reduced) {
      document.getElementById('progress-fill').style.width = TARGET_PCT + '%'
      document.getElementById('pct-label').textContent = TARGET_PCT + '%'
    } else {
      /* ── Entrance sequence ── */
      const tl = gsap.timeline({ delay: .15 })

      tl.from('.logo', {
          y: -24, opacity: 0, duration: .9, ease: 'power3.out'
        })
        .from('.overline', {
          y: 10, opacity: 0, duration: .5, ease: 'power2.out'
        }, '-=.4')
        .from('.headline', {
          y: 36, opacity: 0, duration: .85, ease: 'power3.out'
        }, '-=.35')
        .from('.lead', {
          y: 22, opacity: 0, duration: .65, ease: 'power2.out'
        }, '-=.45')
        .from('.progress-wrap', {
          y: 16, opacity: 0, duration: .55, ease: 'power2.out'
        }, '-=.35')
        .from('.cta', {
          y: 18, opacity: 0, duration: .55, ease: 'power2.out'
        }, '-=.3')
        .from('.deco--emerald', {
          scale: 0, opacity: 0, duration: .75, ease: 'back.out(1.7)'
        }, .1)
        .from('.deco--navy', {
          scale: 0, opacity: 0, duration: .6, ease: 'back.out(1.7)'
        }, .3)

      /* ── Progress bar count-up ── */
      let count = { val: 0 }
      gsap.to(count, {
        val: TARGET_PCT,
        duration: 2.6,
        delay: 1.1,
        ease: 'power1.out',
        onUpdate() {
          const v = Math.round(count.val)
          document.getElementById('pct-label').textContent = v + '%'
          document.getElementById('progress-fill').style.width = v + '%'
        }
      })

      /* ── Continuous floating ── */
      gsap.to('.deco--lime', {
        y: 28, x: 14,
        duration: 5.4, ease: 'sine.inOut', yoyo: true, repeat: -1
      })

      gsap.to('.deco--purple', {
        y: -22, x: -12,
        duration: 6.2, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: .7
      })

      gsap.to('.deco--emerald', {
        y: 18, rotation: 6,
        duration: 4.6, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: .3
      })

      gsap.to('.deco--navy', {
        y: -14, rotation: -5,
        duration: 3.9, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.1
      })

      /* ── Subtle logo breathe ── */
      gsap.to('.logo', {
        scale: 1.025,
        duration: 3.8, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.4
      })
    }
  </script>
</body>
</html>
