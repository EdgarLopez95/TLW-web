<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Learning Warehouse</title>
  <meta name="description" content="The Learning Warehouse website is currently under development.">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --color-emerald: #096c29;
      --color-navy: #171739;
      --color-offwhite: #f7f4ee;
      --color-lime: #c7f136;
      --color-purple: #b49afd;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 12% 18%, rgba(180, 154, 253, 0.34), transparent 26%),
        radial-gradient(circle at 88% 82%, rgba(199, 241, 54, 0.28), transparent 24%),
        var(--color-offwhite);
      color: var(--color-navy);
      font-family: Montserrat, "Helvetica Neue", Arial, sans-serif;
    }

    main {
      width: min(100%, 760px);
      padding: clamp(40px, 8vw, 88px) clamp(24px, 6vw, 64px);
      border: 1px solid rgba(23, 23, 57, 0.08);
      border-radius: 32px;
      background: rgba(247, 244, 238, 0.78);
      box-shadow: 0 28px 80px rgba(23, 23, 57, 0.08);
      text-align: center;
    }

    img {
      width: min(220px, 68vw);
      height: auto;
      margin-bottom: 40px;
    }

    p {
      margin: 0;
      font-size: clamp(18px, 2.2vw, 24px);
      font-weight: 600;
      line-height: 1.5;
    }

    .accent {
      display: block;
      margin-bottom: 14px;
      color: var(--color-emerald);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/images/logos/twh-logo-primary.svg" alt="The Learning Warehouse">
    <span class="accent">Website update</span>
    <p>This website is currently under development. We&rsquo;ll be back soon.</p>
  </main>
</body>
</html>
